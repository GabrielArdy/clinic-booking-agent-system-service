services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clinic
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clinic"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    environment:
      PORT: "3000"
      DB_TYPE: postgres
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/clinic
      ADMIN_TOKEN: change-me
      # OPENROUTER_API_KEY / AI_PROVIDER optional
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
